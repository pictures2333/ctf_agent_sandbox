timezone: Asia/Taipei
locale:
  main: en_US.UTF-8
  install:
    - en_US.UTF-8 UTF-8
    - zh_TW.UTF-8 UTF-8
    - ja_JP.UTF-8 UTF-8
services:
  - name: dockerd
    options: {}
  - name: mcp-terminal
    options:
      host_path: ./mcp/mcp_terminal
      container_path: /mcp/mcp_terminal
      skill_path: ./skills/mcp-terminal-operator
agent-cli-tools:
  - name: codex
    options:
      auth_host_path: ~/.codex/auth.json
      config_host_path: ./agent_cli_tools/codex/config.toml
      prompt_filename: AGENTS.md
  - name: gemini
    options:
      auth_host_path: ~/.gemini/oauth_creds.json
      config_host_path: ./agent_cli_tools/gemini/settings.json
      prompt_filename: GEMINI.md
  - name: opencode
    options:
      auth_host_path: ~/.local/share/opencode/auth.json
      config_host_path: ./agent_cli_tools/opencode/opencode.json
      prompt_filename: AGENTS.md
packages:
  - name: Linux Userspace Pwn
    pacman:
      - python-pwntools
      - checksec
    yay: []
    gem:
      - seccomp-tools
      - one_gadget
    npm: []
    pip: []
custom_install_commands:
  - command: cd ~ && git clone https://github.com/pwndbg/pwndbg.git && cd ~/pwndbg && yes | ./setup.sh
    run_as: agent
  - command: | 
      DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker} && \
      mkdir -p $DOCKER_CONFIG/cli-plugins && \
      curl -SL https://github.com/docker/compose/releases/download/v5.0.1/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose && \
      chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
    run_as: agent
prompt_file: ./prompt/sandbox.md
skills: []
sandbox_env_skill_path: ./.sandbox_generated/skills/sandbox-environment-hint
image_name: agent-sandbox
container_name_prefix: agent-sandbox
workspace_host_path: /home/p23/ctf/midnightflag2026/heap
workspace_container_path: /home/agent/challenge
startup_script_host_path: ./.sandbox_generated/script/startup.sh
